
<style>
*{box-sizing:border-box;margin:0;padding:0;}
canvas{display:block;border-radius:12px;border:1.5px solid #e8e8e8;touch-action:none;cursor:grab;}
.btn{padding:7px 16px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid #d0d0d0;background:#fff;color:#2c2c2a;}
.btn.on{border-color:#185fa5;background:#e6f1fb;color:#185fa5;}
.row{display:flex;align-items:center;gap:8px;margin:5px 0;flex-wrap:wrap;}
.lbl{font-size:13px;font-weight:500;color:#2c2c2a;background:#f5f5f5;border:1.5px solid #d0d0d0;border-radius:20px;padding:6px 14px;white-space:nowrap;}
.val{min-width:56px;text-align:center;font-size:13px;font-weight:500;background:#f5f5f5;border:1.5px solid #d0d0d0;border-radius:20px;padding:5px 10px;}
</style>

<canvas id="cv" style="width:100%;height:62vh;min-height:340px;"></canvas>

<div style="font-size:13px;padding:9px 16px;border-radius:20px;background:#f5f5f5;border:1.5px solid #d0d0d0;color:#2c2c2a;margin:6px 0;font-family:ui-monospace,monospace;line-height:1.8;">
  Glisse <span style="color:#E24B4A">Q</span> — les charges de surface se redistribuent → <span style="color:#1D9E75">E = 0</span> à l'intérieur
</div>

<div class="row">
  <span class="lbl">Charge Q</span>
  <input type="range" id="qval" min="-5" max="5" value="3" step="1" style="flex:1;min-width:80px;accent-color:#E24B4A;">
  <span class="val" id="qvalv" style="color:#E24B4A;border-color:#f09595;">+3 nC</span>
</div>

<div class="row">
  <span class="lbl">Forme</span>
  <button class="btn on" id="sh0" onclick="setShape(0)">Cercle</button>
  <button class="btn" id="sh1" onclick="setShape(1)">Ellipse</button>
  <button class="btn" id="sh2" onclick="setShape(2)">Rectangle</button>
  <button class="btn" id="sh3" onclick="setShape(3)">Goutte</button>
  <button class="btn" id="sh4" onclick="setShape(4)">Triangle</button>
</div>

<div class="row">
  <button class="btn on" id="bF" onclick="showF=!showF;this.className=showF?'btn on':'btn';">Champ ext.</button>
  <button class="btn on" id="bI" onclick="showI=!showI;this.className=showI?'btn on':'btn';">Champ int.</button>
  <button class="btn on" id="bE" onclick="showE=!showE;this.className=showE?'btn on':'btn';">Charges surface</button>
</div>

<div id="info" style="font-size:12px;padding:7px 14px;border-radius:20px;background:#f5f5f5;border:1.5px solid #d0d0d0;color:#666;margin:4px 0;font-family:ui-monospace,monospace;"></div>

<script>
const cv=document.getElementById('cv');
const K=9e9;
let W=0,H=0,drag=false,animT=0;
let showF=true,showI=true,showE=true;
let currentShape=0;
const Q={nx:0,ny:0,q:3};
let curQnx=0,curQny=0;
const NE=28;
let currentAngles=null;

document.getElementById('qval').addEventListener('input',function(){
  Q.q=parseFloat(this.value);
  document.getElementById('qvalv').textContent=(Q.q>=0?'+':'')+Q.q+' nC';
  document.getElementById('qvalv').style.color=Q.q>=0?'#E24B4A':'#378ADD';
  document.getElementById('qvalv').style.borderColor=Q.q>=0?'#f09595':'#b5d4f4';
});

function setShape(s){
  currentShape=s;
  [0,1,2,3,4].forEach(i=>document.getElementById('sh'+i).className=i===s?'btn on':'btn');
  currentAngles=null;
  Q.nx=0;Q.ny=0;
}

// SCALE = 1.65 appliqué ici
const SCALE=1.65;

function con(){
  const cx=W*0.48,cy=H*0.48;
  const base=Math.min(W,H)*0.22*SCALE;
  if(currentShape===0) return{cx,cy,rx:base,ry:base};
  if(currentShape===1) return{cx,cy,rx:base*1.25,ry:base*0.68};
  if(currentShape===2) return{cx,cy,rx:base*1.1,ry:base*0.78};
  if(currentShape===3) return{cx,cy,rx:base*0.82,ry:base*1.1};
  if(currentShape===4) return{cx,cy,rx:base,ry:base};
  return{cx,cy,rx:base,ry:base};
}

function getBorderPoints(c,n){
  const pts=[];
  for(let i=0;i<n;i++){
    const t=i/n;
    const a=t*2*Math.PI;
    let x,y,nx,ny;
    if(currentShape===0){
      x=c.cx+c.rx*Math.cos(a); y=c.cy+c.ry*Math.sin(a);
      nx=Math.cos(a); ny=Math.sin(a);
    } else if(currentShape===1){
      x=c.cx+c.rx*Math.cos(a); y=c.cy+c.ry*Math.sin(a);
      const dl=Math.sqrt((Math.sin(a)/c.rx)**2+(Math.cos(a)/c.ry)**2)+0.001;
      nx=Math.cos(a)/c.rx/dl; ny=Math.sin(a)/c.ry/dl;
    } else if(currentShape===2){
      const px_=Math.cos(a)*c.rx,py_=Math.sin(a)*c.ry;
      const maxAbs=Math.max(Math.abs(px_)/c.rx,Math.abs(py_)/c.ry);
      x=c.cx+px_/maxAbs; y=c.cy+py_/maxAbs;
      const abx=Math.abs(x-c.cx)/c.rx,aby=Math.abs(y-c.cy)/c.ry;
      if(abx>aby){nx=Math.sign(x-c.cx);ny=0;}else{nx=0;ny=Math.sign(y-c.cy);}
    } else if(currentShape===3){
      const dropR=c.rx*(1.0-0.45*Math.cos(a));
      x=c.cx+dropR*Math.sin(a); y=c.cy-c.ry*Math.cos(a);
      const da=0.01;
      const aR2=c.rx*(1.0-0.45*Math.cos(a+da));
      const x2=c.cx+aR2*Math.sin(a+da),y2=c.cy-c.ry*Math.cos(a+da);
      const tx=x2-x,ty=y2-y,tl=Math.sqrt(tx*tx+ty*ty)+0.001;
      nx=ty/tl;ny=-tx/tl;
    } else if(currentShape===4){
      const side=Math.floor(t*3),lt=t*3-side;
      const a1=Math.PI/2+side*2*Math.PI/3,a2=Math.PI/2+(side+1)*2*Math.PI/3;
      const ax=c.cx+c.rx*Math.cos(a1),ay=c.cy-c.rx*Math.sin(a1);
      const bx=c.cx+c.rx*Math.cos(a2),by=c.cy-c.rx*Math.sin(a2);
      x=ax+(bx-ax)*lt; y=ay+(by-ay)*lt;
      const ex=bx-ax,ey=by-ay,el=Math.sqrt(ex*ex+ey*ey)+0.001;
      nx=ey/el;ny=-ex/el;
    }
    pts.push({x,y,nx,ny,a});
  }
  return pts;
}

function isInside(x,y,c){
  if(currentShape===0||currentShape===1)
    return (x-c.cx)**2/c.rx**2+(y-c.cy)**2/c.ry**2<0.90;
  if(currentShape===2)
    return Math.abs(x-c.cx)<c.rx*0.92&&Math.abs(y-c.cy)<c.ry*0.92;
  if(currentShape===3){
    const dx=x-c.cx,dy=y-c.cy;
    const a=Math.atan2(dx,-dy);
    const dropR=c.rx*(1.0-0.45*Math.cos(a));
    return dx*dx/dropR**2+dy*dy/c.ry**2<0.88;
  }
  if(currentShape===4){
    const pts3=[];
    for(let k=0;k<3;k++){const ak=Math.PI/2+k*2*Math.PI/3;pts3.push({x:c.cx+c.rx*Math.cos(ak),y:c.cy-c.rx*Math.sin(ak)});}
    function sign(p1,p2,p3){return(p1.x-p3.x)*(p2.y-p3.y)-(p2.x-p3.x)*(p1.y-p3.y);}
    const p={x,y};
    const d1=sign(p,pts3[0],pts3[1]),d2=sign(p,pts3[1],pts3[2]),d3=sign(p,pts3[2],pts3[0]);
    const shrink=0.88;
    const ps={x:c.cx+(x-c.cx)/shrink,y:c.cy+(y-c.cy)/shrink};
    const e1=sign(ps,pts3[0],pts3[1]),e2=sign(ps,pts3[1],pts3[2]),e3=sign(ps,pts3[2],pts3[0]);
    return !((e1<0||e2<0||e3<0)&&(e1>0||e2>0||e3>0));
  }
  return false;
}

function drawShape(ctx,c,fill,stroke,lw,dash){
  ctx.beginPath();
  if(dash)ctx.setLineDash(dash);else ctx.setLineDash([]);
  if(currentShape===0||currentShape===1){
    ctx.ellipse(c.cx,c.cy,c.rx,c.ry,0,0,Math.PI*2);
  } else if(currentShape===2){
    const r=Math.min(c.rx,c.ry)*0.18;
    ctx.moveTo(c.cx-c.rx+r,c.cy-c.ry);
    ctx.lineTo(c.cx+c.rx-r,c.cy-c.ry);ctx.quadraticCurveTo(c.cx+c.rx,c.cy-c.ry,c.cx+c.rx,c.cy-c.ry+r);
    ctx.lineTo(c.cx+c.rx,c.cy+c.ry-r);ctx.quadraticCurveTo(c.cx+c.rx,c.cy+c.ry,c.cx+c.rx-r,c.cy+c.ry);
    ctx.lineTo(c.cx-c.rx+r,c.cy+c.ry);ctx.quadraticCurveTo(c.cx-c.rx,c.cy+c.ry,c.cx-c.rx,c.cy+c.ry-r);
    ctx.lineTo(c.cx-c.rx,c.cy-c.ry+r);ctx.quadraticCurveTo(c.cx-c.rx,c.cy-c.ry,c.cx-c.rx+r,c.cy-c.ry);
    ctx.closePath();
  } else if(currentShape===3){
    for(let i=0;i<=80;i++){const a=i*2*Math.PI/80;const dr=c.rx*(1-0.45*Math.cos(a));i===0?ctx.moveTo(c.cx+dr*Math.sin(a),c.cy-c.ry*Math.cos(a)):ctx.lineTo(c.cx+dr*Math.sin(a),c.cy-c.ry*Math.cos(a));}
    ctx.closePath();
  } else if(currentShape===4){
    for(let k=0;k<3;k++){const ak=Math.PI/2+k*2*Math.PI/3;k===0?ctx.moveTo(c.cx+c.rx*Math.cos(ak),c.cy-c.rx*Math.sin(ak)):ctx.lineTo(c.cx+c.rx*Math.cos(ak),c.cy-c.rx*Math.sin(ak));}
    ctx.closePath();
  }
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  ctx.strokeStyle=stroke;ctx.lineWidth=lw;ctx.stroke();ctx.setLineDash([]);
}

function qPos(c){return{x:c.cx+curQnx*c.rx*0.65,y:c.cy+curQny*c.ry*0.65};}

function getTargetAngles(c,q,border){
  const qDist=Math.sqrt((q.x-c.cx)**2+(q.y-c.cy)**2);
  const maxDist=Math.min(c.rx,c.ry)*0.65;
  const intensity=Math.min(qDist/(maxDist+0.001),1)*0.65;
  const isPos=Q.q>0;
  const qAngle=Math.atan2(q.y-c.cy,q.x-c.cx);
  return border.map(b=>{
    const baseAng=b.a;
    let diff=qAngle-baseAng;
    while(diff>Math.PI)diff-=2*Math.PI;
    while(diff<-Math.PI)diff+=2*Math.PI;
    return baseAng+(isPos?1:-1)*intensity*diff*0.45;
  });
}

function getBorderAtAngle(c,a){
  const pts=getBorderPoints(c,200);
  const t=((a%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
  const idx=Math.round(t/(2*Math.PI)*200)%200;
  return pts[Math.max(0,Math.min(idx,199))];
}

function getSurfaceCharges(c,q,angles){
  const qx=q.x-c.cx,qy=q.y-c.cy;
  const qLen=Math.sqrt(qx*qx+qy*qy)+0.001;
  const intensity=Math.min(qLen/(Math.min(c.rx,c.ry)*0.65),1);
  const charges=angles.map(a=>{
    const bp=getBorderAtAngle(c,a);
    const bx=bp.x-c.cx,by=bp.y-c.cy;
    const bLen=Math.sqrt(bx*bx+by*by)+0.001;
    const cosA=(bx*qx+by*qy)/(bLen*qLen);
    const baseQ=-Q.q/NE;
    const variation=-Q.q/NE*cosA*intensity*1.5;
    return{x:bp.x,y:bp.y,nx:bp.nx,ny:bp.ny,q:baseQ+variation};
  });
  const sum=charges.reduce((s,c2)=>s+c2.q,0);
  const scale=Math.abs(sum)>0.001?(-Q.q)/sum:1;
  charges.forEach(c2=>c2.q*=scale);
  return charges;
}

function fieldAt(px,py,sources){
  let Ex=0,Ey=0;
  for(const s of sources){
    const dx=px-s.x,dy=py-s.y,r2=dx*dx+dy*dy;
    if(r2<16)continue;
    const r=Math.sqrt(r2);
    const E=K*Math.abs(s.q*1e-9)/(r2/40000);
    const sign=s.q>0?1:-1;
    Ex+=sign*E*dx/r;Ey+=sign*E*dy/r;
  }
  return{Ex,Ey};
}

function arrowHead(ctx,x,y,dx,dy,size,col){
  const l=Math.sqrt(dx*dx+dy*dy);if(l<0.001)return;
  ctx.fillStyle=col;
  ctx.save();ctx.translate(x,y);ctx.rotate(Math.atan2(dy/l,dx/l));
  ctx.beginPath();ctx.moveTo(size,0);ctx.lineTo(-size*.7,-size*.5);ctx.lineTo(-size*.7,size*.5);ctx.closePath();ctx.fill();
  ctx.restore();
}

function draw(){
  const r=cv.getBoundingClientRect();
  const nW=Math.round(r.width)||700,nH=Math.round(r.height)||360;
  if(nW!==W||nH!==H){W=nW;H=nH;cv.width=W;cv.height=H;currentAngles=null;}
  animT+=0.02;
  curQnx+=(Q.nx-curQnx)*0.08;
  curQny+=(Q.ny-curQny)*0.08;

  const ctx=cv.getContext('2d');
  const c=con();
  const q=qPos(c);
  const isPos=Q.q>0;
  const qCol=isPos?'#E24B4A':'#378ADD';
  const border=getBorderPoints(c,NE);
  const targetAngles=getTargetAngles(c,q,border);
  if(!currentAngles||currentAngles.length!==NE)currentAngles=targetAngles.slice();
  for(let i=0;i<NE;i++){
    let diff=targetAngles[i]-currentAngles[i];
    while(diff>Math.PI)diff-=2*Math.PI;
    while(diff<-Math.PI)diff+=2*Math.PI;
    currentAngles[i]+=diff*0.08;
  }
  const surfQ=getSurfaceCharges(c,q,currentAngles);
  const allSources=[{x:q.x,y:q.y,q:Q.q},...surfQ];

  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);

  if(showF){
    for(const sp of surfQ){
      if(Math.abs(sp.q)<0.02)continue;
      const signS=sp.q>0?1:-1;
      let lx=sp.x+sp.nx*signS*18,ly=sp.y+sp.ny*signS*18;
      if(isInside(lx,ly,c))continue;
      const col=sp.q>0?'#E24B4A':'#378ADD';
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.strokeStyle=col+'88';ctx.lineWidth=1.8;
      const pts=[{x:lx,y:ly}];
      for(let s=0;s<500;s++){
        const{Ex,Ey}=fieldAt(lx,ly,allSources);
        const En=Math.sqrt(Ex*Ex+Ey*Ey);if(En<1e-6)break;
        const step=signS*5,sx=step*Ex/En,sy=step*Ey/En;
        lx+=sx;ly+=sy;
        if(lx<-10||lx>W+10||ly<-10||ly>H+10)break;
        if(isInside(lx,ly,c))break;
        ctx.lineTo(lx,ly);pts.push({x:lx,y:ly,dx:sx,dy:sy});
      }
      ctx.stroke();
      for(const frac of[0.3,0.6,0.85]){const idx=Math.floor(frac*pts.length);if(pts[idx]&&pts[idx].dx)arrowHead(ctx,pts[idx].x,pts[idx].y,pts[idx].dx,pts[idx].dy,6,col+'cc');}
    }
  }

  drawShape(ctx,c,'#f0f4ff','#3d3d3a',2.2,null);
  const ci={...c,rx:c.rx*0.88,ry:c.ry*0.88};
  drawShape(ctx,ci,null,'#378ADD44',1.2,[7,6]);

  if(showI){
    for(let l=0;l<16;l++){
      const ang=l*2*Math.PI/16;
      let lx=q.x+Math.cos(ang)*22,ly=q.y+Math.sin(ang)*22;
      if(!isInside(lx,ly,c))continue;
      ctx.beginPath();ctx.moveTo(lx,ly);ctx.strokeStyle=qCol+'77';ctx.lineWidth=1.4;
      const pts=[{x:lx,y:ly}];
      for(let s=0;s<600;s++){
        const{Ex,Ey}=fieldAt(lx,ly,allSources);
        const En=Math.sqrt(Ex*Ex+Ey*Ey);if(En<1e-8)break;
        const step=(isPos?1:-1)*4,sx=step*Ex/En,sy=step*Ey/En;
        lx+=sx;ly+=sy;if(!isInside(lx,ly,c))break;
        ctx.lineTo(lx,ly);pts.push({x:lx,y:ly,dx:sx,dy:sy});
      }
      ctx.stroke();
      for(const frac of[0.4,0.75]){const idx=Math.floor(frac*pts.length);if(pts[idx]&&pts[idx].dx)arrowHead(ctx,pts[idx].x,pts[idx].y,pts[idx].dx,pts[idx].dy,5,qCol+'99');}
    }
  }

  if(showE){
    for(const sp of surfQ){
      const isNeg=sp.q<0;
      const col2=isNeg?'#378ADD':'#E24B4A';
      const bg=isNeg?'#dbeafe':'#fee2e2';
      const sz=Math.min(Math.max(4,4+Math.abs(sp.q/(Math.abs(Q.q)/NE+0.001))*1.5),9);
      ctx.beginPath();ctx.arc(sp.x,sp.y,sz,0,Math.PI*2);
      ctx.fillStyle=bg;ctx.fill();ctx.strokeStyle=col2;ctx.lineWidth=1.5;ctx.stroke();
      ctx.fillStyle=col2;ctx.font='500 9px system-ui';ctx.textAlign='center';
      ctx.fillText(isNeg?'−':'+',sp.x,sp.y+3.5);
    }
  }

  const qR=15+Math.abs(Q.q)*1.8;
  ctx.beginPath();ctx.arc(q.x,q.y,qR+4+Math.sin(animT*3)*1.5,0,Math.PI*2);
  ctx.fillStyle=qCol+'18';ctx.fill();
  ctx.beginPath();ctx.arc(q.x,q.y,qR,0,Math.PI*2);
  ctx.fillStyle=isPos?'#fee2e2':'#dbeafe';ctx.fill();
  ctx.strokeStyle=qCol;ctx.lineWidth=2.5;ctx.stroke();
  ctx.fillStyle=qCol;ctx.font='500 17px system-ui';ctx.textAlign='center';
  ctx.fillText(isPos?'+':'−',q.x,q.y+6);
  ctx.font='500 11px system-ui';
  ctx.fillText((Q.q>=0?'+':'')+Q.q+' nC',q.x,q.y+qR+14);

  const eLY=q.y<c.cy?c.cy+c.ry*0.3:c.cy-c.ry*0.3;
  ctx.font='500 15px system-ui';ctx.textAlign='center';ctx.fillStyle='#1D9E75';
  ctx.fillText('E = 0',c.cx,eLY);
  ctx.font='11px system-ui';ctx.fillStyle='#888';ctx.fillText('intérieur',c.cx,eLY+16);

  ctx.font='12px system-ui';ctx.textAlign='left';
  ctx.fillStyle='#E24B4A';ctx.fillText('● charge +',12,H-28);
  ctx.fillStyle='#378ADD';ctx.fillText('● charge −',90,H-28);
  ctx.fillStyle='#1D9E75';ctx.fillText('E=0 intérieur',168,H-28);
  ctx.fillStyle='#888';ctx.fillText('← déplace Q',12,H-12);

  const dist=(Math.sqrt(Q.nx**2+Q.ny**2)*100).toFixed(0);
  document.getElementById('info').textContent=
    `Q ${Q.q>=0?'+':''}${Q.q} nC à ${dist}% du centre — `+
    (isPos?' charges − côté Q, charges + côté opposé':' charges + côté Q, charges − côté opposé');

  requestAnimationFrame(draw);
}

function getPos(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
function startDrag(e){const{x,y}=getPos(e);const c=con(),q=qPos(c);if(Math.sqrt((x-q.x)**2+(y-q.y)**2)<24+Math.abs(Q.q)*2){drag=true;cv.style.cursor='grabbing';}}
function moveDrag(e){
  if(!drag)return;e.preventDefault();
  const{x,y}=getPos(e);const c=con();
  let nx=(x-c.cx)/(c.rx*0.65),ny=(y-c.cy)/(c.ry*0.65);
  const d=Math.sqrt(nx*nx+ny*ny);if(d>0.90){nx=nx/d*0.90;ny=ny/d*0.90;}
  Q.nx=nx;Q.ny=ny;
}
function endDrag(){drag=false;cv.style.cursor='grab';}
cv.addEventListener('mousedown',startDrag);cv.addEventListener('mousemove',moveDrag);cv.addEventListener('mouseup',endDrag);
cv.addEventListener('touchstart',startDrag,{passive:false});cv.addEventListener('touchmove',moveDrag,{passive:false});cv.addEventListener('touchend',endDrag);

draw();
</script>
